server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip для текстовых ассетов
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Долгое кэширование хэшированных ассетов (vite добавляет хэш в имя файла)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: все не-найденные пути отдаём на index.html,
    # чтобы работал client-side роутинг (react-router-dom)
    location / {
        try_files $uri $uri/ /index.html;
    }
}